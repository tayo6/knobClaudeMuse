name: Build VST3 (Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-windows:
    # Pinned to windows-2022 rather than windows-latest: GitHub migrated
    # windows-latest/windows-2025 to a Visual Studio 2026 image between
    # 2026-06-08 and 2026-06-15. VS2022 is no longer installed there, so
    # CMake's "Visual Studio 17 2022" generator can't find it (this is what
    # caused "could not find any instance of Visual Studio"). JUCE 7.0.12
    # predates VS2026 and its newer MSVC toolset, so pinning to the older,
    # still-supported windows-2022 image is the safer fix here rather than
    # switching to the "Visual Studio 18 2026" generator string.
    # See: https://github.com/actions/runner-images/issues/14017
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build (Release)
        run: cmake --build build --config Release --target GradientKnob_VST3 --parallel

      - name: Locate VST3 artifact
        id: locate
        shell: pwsh
        run: |
          $vst3 = Get-ChildItem -Path build -Recurse -Filter "*.vst3" -Directory | Select-Object -First 1
          if (-not $vst3) {
            throw "No .vst3 bundle found under build/"
          }
          Write-Host "Found VST3 at $($vst3.FullName)"
          echo "vst3_path=$($vst3.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: GradientKnob-VST3-Windows
          path: ${{ steps.locate.outputs.vst3_path }}
          if-no-files-found: error