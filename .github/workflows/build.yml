name: Build VST3 (Windows 7 compatible)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

env:
  RUST_TOOLCHAIN: "1.77.2"

jobs:
  build-windows7:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain (Windows 7 compatible)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-pc-windows-msvc

      - name: Resolve Win7-compatible nih-plug commit
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          git clone --quiet https://github.com/robbert-vdh/nih-plug.git /tmp/nih-plug-probe
          cd /tmp/nih-plug-probe
          SHA=$(git log --before="2024-08-18T00:00:00Z" -n 1 --format=%H origin/master)
          if [ -z "$SHA" ]; then
            echo "Could not resolve a pre-2024-08-18 commit" >&2
            exit 1
          fi
          echo "Resolved nih-plug commit: $SHA"
          echo "nih_plug_rev=$SHA" >> "$GITHUB_OUTPUT"

      - name: Patch Cargo.toml with resolved commit
        shell: bash
        run: |
          set -euo pipefail
          SHA="${{ steps.resolve.outputs.nih_plug_rev }}"
          sed -i "s/rev = \"PINNED_BY_CI\"/rev = \"$SHA\"/g" Cargo.toml
          echo "--- Patched Cargo.toml ---"
          grep -n "nih_plug" Cargo.toml

      - name: Generate Cargo.lock
        shell: bash
        run: |
          set -euo pipefail
          if ! cargo +${{ env.RUST_TOOLCHAIN }} generate-lockfile 2> /tmp/lockfile_err.txt; then
            cat /tmp/lockfile_err.txt
            if grep -q "edition2024" /tmp/lockfile_err.txt; then
              echo ""
              echo "============================================================"
              echo "This is the known Windows-7-toolchain vs. edition2024 issue."
              echo "A transitive dependency published a newer release that"
              echo "requires cargo >= 1.85, which our pinned 1.77.2 can't parse."
              echo ""
              echo "Fix: open Cargo.toml, find the '# --- Transitive-dependency"
              echo "ceiling pins ---' section, and add a line for the crate"
              echo "named in the error above, e.g.:"
              echo '    <crate_name> = "=<last-pre-2025-version>"'
              echo "Find that version on the crate's docs.rs release history."
              echo "============================================================"
            fi
            exit 1
          fi

      - name: Build release cdylib
        run: cargo +${{ env.RUST_TOOLCHAIN }} build --release --target x86_64-pc-windows-msvc

      - name: Assemble VST3 bundle
        shell: pwsh
        run: |
          # Manually assemble the VST3 bundle layout, since nih-plug's
          # xtask bundler itself depends on the workspace resolver from
          # the pinned (older) nih-plug commit and isn't guaranteed stable
          # to invoke directly across arbitrary commits. This mirrors the
          # standard VST3 bundle structure any host expects on Windows:
          #   GradientKnob.vst3/Contents/x86_64-win/GradientKnob.vst3
          $dllPath = "target/x86_64-pc-windows-msvc/release/gradient_knob.dll"
          if (-not (Test-Path $dllPath)) {
            throw "Expected build output not found at $dllPath"
          }

          $bundleRoot = "target/bundled/GradientKnob.vst3"
          $archDir = Join-Path $bundleRoot "Contents/x86_64-win"
          New-Item -ItemType Directory -Force -Path $archDir | Out-Null

          Copy-Item $dllPath (Join-Path $archDir "GradientKnob.vst3")

          Write-Host "Bundled VST3 at $bundleRoot"

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: GradientKnob-VST3-Windows7
          path: target/bundled/GradientKnob.vst3
          if-no-files-found: error